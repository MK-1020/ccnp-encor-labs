enable
configure terminal
hostname SW1

spanning-tree mode rapid-pvst

vlan 10
 name USERS
vlan 20
 name SERVERS

interface gi0/0
 description TRUNK_TO_SW2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 1,10,20
 no shutdown

interface gi0/1
 description TRUNK_TO_SW3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 1,10,20
 no shutdown

interface gi0/2
 description RESERVED_FOR_CH2_LAB
 no shutdown

end
write memory
