enable
configure terminal
hostname SW1

vlan 10
 name USERS
vlan 20
 name SERVERS

interface gi0/0
 description PC1_VLAN10
 switchport mode access
 switchport access vlan 10
 no shutdown

interface gi0/1
 description PC2_VLAN20
 switchport mode access
 switchport access vlan 20
 no shutdown

interface gi0/2
 description TRUNK_TO_SW2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,20
 no shutdown

end
write memory
