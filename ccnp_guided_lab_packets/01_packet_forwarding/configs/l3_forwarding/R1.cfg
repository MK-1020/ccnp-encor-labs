enable
configure terminal
hostname R1

interface GigabitEthernet0/0
 description To_PC1
 ip address 192.168.10.1 255.255.255.0
 no shutdown

interface GigabitEthernet0/1
 description To_R2
 ip address 10.12.12.1 255.255.255.252
 no shutdown

ip route 192.168.30.0 255.255.255.0 10.12.12.2

end
write memory
