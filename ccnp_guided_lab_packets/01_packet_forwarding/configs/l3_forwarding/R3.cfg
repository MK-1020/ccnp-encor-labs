enable
configure terminal
hostname R3

interface GigabitEthernet0/0
 description To_R2
 ip address 10.23.23.2 255.255.255.252
 no shutdown

interface GigabitEthernet0/1
 description To_PC2
 ip address 192.168.30.1 255.255.255.0
 no shutdown

ip route 192.168.10.0 255.255.255.0 10.23.23.1

end
write memory
